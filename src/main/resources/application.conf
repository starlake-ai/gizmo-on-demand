gizmosql-proxy {
  # Proxy server configuration
  proxy {
    host = "0.0.0.0"
    host = ${?PROXY_HOST}

    port = 31338
    port = ${?PROXY_PORT}

    # TLS configuration for proxy server (client → proxy)
    tls {
      enabled = true
      enabled = ${?PROXY_TLS_ENABLED}

      # Path to server certificate chain
      cert-chain = "gizmosql-proxy/certs/server-cert.pem"
      cert-chain = ${?PROXY_TLS_CERT_CHAIN}

      # Path to server private key
      private-key = "gizmosql-proxy/certs/server-key.pem"
      private-key = ${?PROXY_TLS_PRIVATE_KEY}
    }
  }
  
  # Backend GizmoSQL server configuration
  backend {
    host = "localhost"
    host = ${?GIZMO_SERVER_HOST}

    port = 31337
    port = ${?GIZMO_SERVER_PORT}

    # TLS configuration for backend connection
    tls {
      enabled = false
      enabled = ${?GIZMOSQL_TLS_ENABLED}

      # Path to trusted certificates for backend
      trusted-certificates = ""
      trusted-certificates = ${?GIZMOSQL_TLS_CERT}
    }

    # Default credentials for anonymous connections (e.g., JDBC clients that don't send auth headers)
    # If set, these credentials will be used when no Authorization header is provided
    default-username = ""
    default-username = ${?GIZMOSQL_DEFAULT_USERNAME}

    default-password = ""
    default-password = ${?GIZMOSQL_DEFAULT_PASSWORD}
  }
  
  # Statement validation configuration
  validation {
    # Enable/disable statement validation
    enabled = true
    enabled = ${?VALIDATION_ENABLED}
    
    # Validation rules
    rules {
      # Allow all statements by default (set to false to deny by default)
      allow-by-default = true
      allow-by-default = ${?VALIDATION_ALLOW_BY_DEFAULT}
      
      # List of users who bypass validation (e.g., admins)
      bypass-users = ["admin"]
      bypass-users = ${?VALIDATION_BYPASS_USERS}
      
      # Database-specific rules file (optional)
      rules-file = ""
      rules-file = ${?VALIDATION_RULES_FILE}
    }
  }
  
  # Logging configuration
  logging {
    level = "INFO"
    level = ${?LOG_LEVEL}

    # Log all SQL statements
    log-statements = true
    log-statements = ${?LOG_STATEMENTS}

    # Log validation decisions
    log-validation = true
    log-validation = ${?LOG_VALIDATION}
  }

  # Session variables passed from environment
  session {
    gizmosql-username = ""
    gizmosql-username = ${?GIZMOSQL_USERNAME}

    gizmosql-password = ""
    gizmosql-password = ${?GIZMOSQL_PASSWORD}

    sl-project-id = ""
    sl-project-id = ${?SL_DB_ID}

    sl-data-path = ""
    sl-data-path = ${?SL_DATA_PATH}

    pg-username = ""
    pg-username = ${?PG_USERNAME}

    pg-password = ""
    pg-password = ${?PG_PASSWORD}

    pg-port = 5432
    pg-port = ${?PG_PORT}

    pg-host = "host.docker.internal"
    pg-host = ${?PG_HOST}

    # JWT Secret key for token generation
    jwt-secret-key = "a_very_secret_key"
    jwt-secret-key = ${?JWT_SECRET_KEY}

    # ACL tenant identifier for this session
    acl-tenant = "default"
    acl-tenant = ${?ACL_TENANT}
  }

  # Authentication configuration
  authentication {
    # JWT claim name for role extraction
    role-claim = "role"
    role-claim = ${?AUTH_ROLE_CLAIM}

    # PostgreSQL database authentication
    database {
      enabled = false
      enabled = ${?AUTH_DB_ENABLED}

      jdbc-url = "jdbc:postgresql://localhost:5432/gizmosql_auth"
      jdbc-url = ${?AUTH_DB_JDBC_URL}

      username = "postgres"
      username = ${?AUTH_DB_USERNAME}

      password = ""
      password = ${?AUTH_DB_PASSWORD}

      # SQL query that returns (password_hash, role) for a given username.
      # Use ? as the username placeholder.
      query = "SELECT password, role FROM users WHERE username = ?"
      query = ${?AUTH_DB_QUERY}
    }

    # Keycloak OIDC
    keycloak {
      enabled = false
      enabled = ${?AUTH_KEYCLOAK_ENABLED}

      base-url = ""
      base-url = ${?AUTH_KEYCLOAK_BASE_URL}

      realm = ""
      realm = ${?AUTH_KEYCLOAK_REALM}

      client-id = ""
      client-id = ${?AUTH_KEYCLOAK_CLIENT_ID}

      client-secret = ""
      client-secret = ${?AUTH_KEYCLOAK_CLIENT_SECRET}
    }

    # Google OIDC
    google {
      enabled = false
      enabled = ${?AUTH_GOOGLE_ENABLED}

      client-id = ""
      client-id = ${?AUTH_GOOGLE_CLIENT_ID}

      client-secret = ""
      client-secret = ${?AUTH_GOOGLE_CLIENT_SECRET}

      # Fetch Google Workspace group memberships via Directory API
      groups-lookup = false
      groups-lookup = ${?AUTH_GOOGLE_GROUPS_LOOKUP}

      # Path to service account JSON key with Directory API read access
      service-account-key-path = ""
      service-account-key-path = ${?AUTH_GOOGLE_SERVICE_ACCOUNT_KEY_PATH}

      # Cache TTL for group memberships in seconds (default: 5 minutes)
      groups-cache-ttl-seconds = 300
      groups-cache-ttl-seconds = ${?AUTH_GOOGLE_GROUPS_CACHE_TTL}
    }

    # Azure AD
    azure {
      enabled = false
      enabled = ${?AUTH_AZURE_ENABLED}

      tenant-id = ""
      tenant-id = ${?AUTH_AZURE_TENANT_ID}

      client-id = ""
      client-id = ${?AUTH_AZURE_CLIENT_ID}

      client-secret = ""
      client-secret = ${?AUTH_AZURE_CLIENT_SECRET}
    }

    # AWS Cognito
    aws {
      enabled = false
      enabled = ${?AUTH_AWS_ENABLED}

      region = ""
      region = ${?AUTH_AWS_REGION}

      user-pool-id = ""
      user-pool-id = ${?AUTH_AWS_USER_POOL_ID}

      client-id = ""
      client-id = ${?AUTH_AWS_CLIENT_ID}
    }

    # External JWT validation (custom issuers)
    jwt {
      secret-key = ""
      secret-key = ${?AUTH_JWT_SECRET_KEY}

      public-key-path = ""
      public-key-path = ${?AUTH_JWT_PUBLIC_KEY_PATH}

      issuer = ""
      issuer = ${?AUTH_JWT_ISSUER}

      audience = ""
      audience = ${?AUTH_JWT_AUDIENCE}
    }

    # OAuth/SSO browser-based flow (for ADBC/CLI clients)
    oauth {
      enabled = false
      enabled = ${?AUTH_OAUTH_ENABLED}

      # HTTP port for OAuth callback server
      port = 31339
      port = ${?AUTH_OAUTH_PORT}

      # Public base URL for redirects (auto-derived if empty)
      base-url = ""
      base-url = ${?AUTH_OAUTH_BASE_URL}

      # OAuth scopes to request
      scopes = "openid profile email"
      scopes = ${?AUTH_OAUTH_SCOPES}

      # Pending session timeout in seconds
      session-timeout-seconds = 900
      session-timeout-seconds = ${?AUTH_OAUTH_SESSION_TIMEOUT}

      # Disable TLS on the OAuth HTTP server (localhost dev only)
      disable-tls = true
      disable-tls = ${?AUTH_OAUTH_DISABLE_TLS}
    }
  }

  # ACL (SQL-level access control) configuration
  acl {
    # Enable/disable ACL validation
    enabled = false
    enabled = ${?ACL_ENABLED}

    # Base path for tenant ACL folders. The prefix determines the storage backend:
    #   /local/path       → local filesystem
    #   s3://bucket/path  → AWS S3
    #   gs://bucket/path  → Google Cloud Storage
    #   az://container/path → Azure Blob Storage
    base-path = "/etc/gizmosql/acl"
    base-path = ${?ACL_BASE_PATH}

    # SQL dialect for parsing (duckdb, ansi)
    dialect = "duckdb"
    dialect = ${?ACL_DIALECT}

    # JWT claim name containing user groups
    groups-claim = "groups"
    groups-claim = ${?ACL_GROUPS_CLAIM}

    # Maximum number of tenants cached in memory
    max-tenants = 100
    max-tenants = ${?ACL_MAX_TENANTS}

    # S3 configuration (used when base-path starts with s3://)
    # All fields are Option — absent by default (auto-detect)
    s3 {
      region = ${?ACL_S3_REGION}
      credentials-file = ${?ACL_S3_CREDENTIALS_FILE}
    }

    # GCS configuration (used when base-path starts with gs://)
    gcs {
      project-id = ${?ACL_GCS_PROJECT_ID}
      service-account-key-file = ${?ACL_GCS_SERVICE_ACCOUNT_KEY_FILE}
    }

    # Azure configuration (used when base-path starts with az://)
    azure {
      connection-string = ${?ACL_AZURE_CONNECTION_STRING}
    }

    # Change detection for automatic ACL reload
    watcher {
      enabled = true
      enabled = ${?ACL_WATCHER_ENABLED}

      debounce-ms = 500
      debounce-ms = ${?ACL_WATCHER_DEBOUNCE_MS}

      max-backoff-ms = 60000
      max-backoff-ms = ${?ACL_WATCHER_MAX_BACKOFF_MS}

      # Polling interval for cloud backends (ignored for local filesystem)
      poll-interval-ms = 30000
      poll-interval-ms = ${?ACL_WATCHER_POLL_INTERVAL_MS}
    }
  }

}

gizmo-on-demand {
  host = "0.0.0.0"
  host = ${?SL_GIZMO_ON_DEMAND_HOST}

  port = 10900
  port = ${?SL_GIZMO_ON_DEMAND_PORT}

  min-port = 11900
  min-port = ${?SL_GIZMO_MIN_PORT}

  max-port = 12000
  max-port = ${?SL_GIZMO_MAX_PORT}

  max-processes = 10
  max-processes = ${?SL_GIZMO_MAX_PROCESSES}

  default-gizmo-script = "/opt/gizmosql/scripts/docker-start-sl-gizmosql.sh"
  default-gizmo-script = ${?SL_GIZMO_DEFAULT_SCRIPT}

  proxy-script = "/opt/gizmosql/scripts/docker-start-proxy.sh"
  proxy-script = ${?SL_GIZMO_PROXY_SCRIPT}

  # API Key is optional in config, but required at runtime for logic
  api-key = "a_secret_api_key"
  api-key = ${?SL_GIZMO_API_KEY}

  # Idle timeout in seconds for the gizmo backend server
  # >0: Timeout in seconds, the gizmo backend server is stopped after the timeout period if there are no requests
  # <0: No timeout (default), the gizmo backend server is never stopped
  # =0: The gizmo backend server is stopped immediately after each request is processed
  idle-timeout = -1
  idle-timeout = ${?SL_GIZMO_IDLE_TIMEOUT}

  # Runtime type: "local" (default) or "kubernetes"
  runtime-type = "local"
  runtime-type = ${?SL_GIZMO_RUNTIME_TYPE}

  # Kubernetes configuration (used when runtime-type = "kubernetes")
  kubernetes {
    namespace = "default"
    namespace = ${?SL_GIZMO_K8S_NAMESPACE}

    image-name = "gizmo-proxy:latest"
    image-name = ${?SL_GIZMO_K8S_IMAGE}

    service-account-name = null
    service-account-name = ${?SL_GIZMO_K8S_SERVICE_ACCOUNT}

    proxy-port = 31338
    proxy-port = ${?SL_GIZMO_K8S_PROXY_PORT}

    backend-port = 31337
    backend-port = ${?SL_GIZMO_K8S_BACKEND_PORT}

    service-type = "ClusterIP"
    service-type = ${?SL_GIZMO_K8S_SERVICE_TYPE}

    image-pull-policy = "IfNotPresent"
    image-pull-policy = ${?SL_GIZMO_K8S_IMAGE_PULL_POLICY}

    image-pull-secrets = []

    labels = {}

    startup-timeout-seconds = 120
    startup-timeout-seconds = ${?SL_GIZMO_K8S_STARTUP_TIMEOUT}

    # PVC to mount in spawned instance pods (for DuckLake data files)
    volume-claim-name = null
    volume-claim-name = ${?SL_GIZMO_K8S_VOLUME_CLAIM_NAME}

    volume-mount-path = "/projects"
    volume-mount-path = ${?SL_GIZMO_K8S_VOLUME_MOUNT_PATH}
  }
}

