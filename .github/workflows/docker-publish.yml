name: Publish Docker Image

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_type:
        description: 'Publish type (snapshot or release)'
        required: true
        default: 'snapshot'
        type: choice
        options:
          - snapshot
          - release
      gizmo_version:
        description: 'GizmoSQL base image version (leave empty for Dockerfile default)'
        required: false
        default: ''
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract version
        id: version
        run: |
          if [ -f version.txt ]; then
            BASE_VERSION=$(cat version.txt | tr -d '[:space:]')
          else
            BASE_VERSION="0.1.0"
          fi
          echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          
          # Determine if this is a release or snapshot
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tagged release
            VERSION=${GITHUB_REF#refs/tags/v}
            PUBLISH_TYPE="release"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger
            PUBLISH_TYPE="${{ github.event.inputs.publish_type }}"
            if [ "$PUBLISH_TYPE" = "release" ]; then
              VERSION="${BASE_VERSION}"
            else
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              VERSION="${BASE_VERSION}-SNAPSHOT-${TIMESTAMP}"
            fi
          else
            # Push to branch - always snapshot
            PUBLISH_TYPE="snapshot"
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            VERSION="${BASE_VERSION}-SNAPSHOT-${TIMESTAMP}"
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "publish_type=${PUBLISH_TYPE}" >> $GITHUB_OUTPUT
      
      - name: Determine Docker tags
        id: tags
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PUBLISH_TYPE="${{ steps.version.outputs.publish_type }}"

          if [ "$PUBLISH_TYPE" = "release" ]; then
            TAGS="starlakeai/gizmo-on-demand:${VERSION},starlakeai/gizmo-on-demand:latest"
          else
            TAGS="starlakeai/gizmo-on-demand:${VERSION},starlakeai/gizmo-on-demand:snapshot,starlakeai/gizmo-on-demand:latest-snapshot"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            ${{ github.event.inputs.gizmo_version != '' && format('GIZMO_VERSION={0}', github.event.inputs.gizmo_version) || '' }}
          cache-from: type=registry,ref=starlakeai/gizmo-on-demand:buildcache
          cache-to: type=registry,ref=starlakeai/gizmo-on-demand:buildcache,mode=max
          platforms: linux/amd64,linux/arm64
      
      - name: Create release summary
        run: |
          echo "## Docker Image Published 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Type:** ${{ steps.version.outputs.publish_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Available tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull starlakeai/gizmo-on-demand:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

